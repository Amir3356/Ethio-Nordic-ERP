
worker_processes  1;

error_log  logs/error.log info;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==================== RATE LIMITING ZONES ====================
    # General API rate limit: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

    # Auth endpoints: 5 requests per second per IP (stricter)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # Login endpoint: 3 requests per second per IP (strictest)
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=3r/s;

    # Admin endpoints: 20 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_admin:10m rate=20r/s;

    # Rate limit response configuration
    limit_req_status 429;
    limit_req_log_level warn;

    # ==================== UPSTREAM BACKENDS ====================
    upstream laravel_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream frontend {
        server 127.0.0.1:5173;
        keepalive 16;
    }

    # ==================== API GATEWAY SERVER ====================
    server {
        listen       80;
        server_name  localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Client body size limit
        client_max_body_size 10M;

        # ==================== CORS CONFIGURATION ====================
        # Handle preflight requests
        location = /preflight {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # ==================== API ROUTING ====================

        # Health check endpoint (no rate limiting)
        location /api/health {
            proxy_pass http://laravel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Login endpoint (strictest rate limiting)
        location /api/auth/login {
            limit_req zone=api_login burst=5 nodelay;
            proxy_pass http://laravel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://laravel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin/System endpoints
        location ~ ^/api/(system|security|roles|permissions)/ {
            limit_req zone=api_admin burst=30 nodelay;
            proxy_pass http://laravel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other API endpoints (general rate limiting)
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://laravel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================== FRONTEND ROUTING ====================
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==================== STATIC ASSETS ====================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ==================== ERROR PAGES ====================
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"error": "Too many requests", "message": "Rate limit exceeded. Please try again later."}';
        }

        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 503 '{"error": "Service unavailable", "message": "Backend server is temporarily unavailable."}';
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
