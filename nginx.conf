# =============================================================================
# Ethio Nordic ERP - NGINX API Gateway Configuration
# =============================================================================
# Place this file in: C:\nginx\conf\nginx.conf (or include it via nginx.conf)
# Then run: nginx -t && nginx -s reload
# =============================================================================

# Rate limiting zones
# Login endpoint: strict limit (5 requests/second per IP)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

# General API: moderate limit (20 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;

# Authenticated API: relaxed limit (30 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=30r/s;

# Static assets: generous limit (50 requests/second per IP)
limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;

# Health check: no limit (for monitoring)
limit_req_zone $binary_remote_addr zone=health:10m rate=100r/s;

# Connection limiting (prevent DDoS)
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Rate limit responses
limit_req_status 429;
limit_conn_status 429;

# Logging format with rate limit info
log_format gateway_log '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time '
                       'limit=$limit_req_status';

upstream laravel_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream react_spa {
    server 127.0.0.1:5173;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost ethio-nordic.local;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limit error page
    error_page 429 = @rate_limited;

    # Request size limit (10MB for file uploads)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # =========================================================================
    # Health Check Endpoint (no rate limit)
    # =========================================================================
    location = /api/health {
        limit_req zone=health burst=10 nodelay;
        proxy_pass http://laravel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/version {
        limit_req zone=health burst=10 nodelay;
        proxy_pass http://laravel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Auth Endpoints (strict rate limiting - brute force protection)
    # =========================================================================
    location ~ ^/api/auth/(login|login-with-recovery)$ {
        limit_req zone=login burst=3 nodelay;
        limit_conn addr 10;

        proxy_pass http://laravel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # No caching for auth responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/auth/(activate|setup-2fa|verify-2fa|setup-2fa-onboarding|verify-2fa-onboarding|skip-2fa-onboarding)$ {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://laravel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # General API (moderate rate limiting)
    # =========================================================================
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        limit_conn addr 20;

        proxy_pass http://laravel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # CORS headers
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://localhost:5173";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, X-Request-ID";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # =========================================================================
    # Vite Dev Server / React SPA
    # =========================================================================
    location / {
        limit_req zone=api_auth burst=20 nodelay;

        proxy_pass http://react_spa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================================================
    # Static Assets (generous rate limit, long cache)
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        limit_req zone=static burst=100 nodelay;

        proxy_pass http://react_spa;
        proxy_set_header Host $host;

        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Asset-Cache "HIT" always;
    }

    # =========================================================================
    # Rate Limited Response
    # =========================================================================
    location @rate_limited {
        default_type application/json;
        return 429 '{"error": "Too many requests. Please slow down and try again later.", "retry_after": 1}';
    }

    # =========================================================================
    # Block common attack patterns
    # =========================================================================
    location ~* \.(env|git|svn|htaccess|htpasswd)$ {
        deny all;
        return 404;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root html;
        internal;
    }
}

