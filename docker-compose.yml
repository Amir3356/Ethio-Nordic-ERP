services:
  web:
    build:
      context: ./client
    ports:
      - "5173:5173"
    depends_on:
      - app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - app
    ports:
      - "80:80"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ./server
    environment: &app-env
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "base64:s/7sV8/rFJwPV2/mrUwGC2a1j8QLUwWDx2M3lYLVFis="
      APP_URL: http://localhost
      ASSET_URL: http://localhost
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ethio_nordic_erp
      DB_USERNAME: ethio_nordic
      DB_PASSWORD: ethio_nordic
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: ethio_nordic_erp_
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ethio_nordic_erp
      POSTGRES_USER: ethio_nordic
      POSTGRES_PASSWORD: ethio_nordic
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: