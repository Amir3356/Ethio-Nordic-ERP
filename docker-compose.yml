services:

  # Laravel Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: erp-laravel
    restart: unless-stopped
    volumes:
      - ./server:/var/www
    networks:
      - erp-network
    depends_on:
      - postgres
      - redis


  # NGINX Web Server
  nginx:
    image: nginx:latest
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./server:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - client
    networks:
      - erp-network


  # React + Vite Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: erp-react
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - erp-network


  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - erp-network


  # Redis Cache / Queue
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - erp-network



networks:
  erp-network:


volumes:
  postgres-data: