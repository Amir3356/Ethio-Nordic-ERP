services:

  client:
    build:
      context: ./client
    container_name: ethio-nordic-react
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
    networks:
      - ethio-nordic-network

  server:
    build:
      context: ./server
    container_name: ethio-nordic-laravel
    volumes:
      - ./server:/var/www
    networks:
      - ethio-nordic-network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:latest
    container_name: ethio-nordic-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
    networks:
      - ethio-nordic-network

  postgres:
    image: postgres:17
    container_name: ethio-nordic-postgres
    environment:
      POSTGRES_DB: Ethio_Nordic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AEHJSS36
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ethio-nordic-network

  redis:
    image: redis:7-alpine
    container_name: ethio-nordic-redis
    ports:
      - "6379:6379"
    networks:
      - ethio-nordic-network

networks:
  ethio-nordic-network:

volumes:
  postgres-data: