# =============================================================================
# Ethio Nordic Trading PLC - Nginx API Gateway
# =============================================================================

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=api_sessions:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_read:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=5r/s;

limit_req_status 429;

server {
    listen 80;
    server_name localhost;

    root /var/www/public;
    index index.php index.html;

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # React Frontend (No rate limiting)
    # ============================================
    location / {
        proxy_pass http://client:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ============================================
    # Login Endpoints (Very strict: 3 req/s, burst 5)
    # ============================================
    location ~ ^/api/auth/(login|login-with-recovery)$ {
        limit_req zone=api_login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # Auth Endpoints (Strict: 5 req/s, burst 10)
    # ============================================
    location ~ ^/api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # Session Management (5 req/s, burst 10)
    # ============================================
    location ~ ^/api/sessions {
        limit_req zone=api_sessions burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # Write Operations - POST, PUT, PATCH, DELETE (5 req/s)
    # ============================================
    location ~ ^/api/(users|roles|permissions) {
        limit_req zone=api_write burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # Read Operations - GET (20 req/s)
    # ============================================
    location ~ ^/api/(dashboard|login-activity) {
        limit_req zone=api_read burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # General API Fallback (10 req/s)
    # ============================================
    location /api {
        limit_req zone=api_general burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # PHP-FPM Handler (catches all .php requests)
    # ============================================
    location ~ \.php$ {
        fastcgi_pass server:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================
    # Block hidden files
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
