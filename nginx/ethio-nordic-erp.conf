# =============================================================================
# Ethio Nordic ERP - Nginx API Gateway Configuration
# =============================================================================
# Place this file in your Nginx conf directory:
#   Windows: C:\nginx\conf\ethio-nordic-erp.conf
#   Linux:   /etc/nginx/sites-available/ethio-nordic-erp
#
# Then include it in your main nginx.conf or symlink to sites-enabled
# =============================================================================

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=api_heavy:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_health:10m rate=10r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Rate limit status code
limit_req_status 429;
limit_conn_status 429;

# Upstream backends
upstream laravel_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream frontend_backend {
    server 127.0.0.1:5173;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    # Logging
    access_log logs/ethio-nordic-access.log;
    error_log logs/ethio-nordic-error.log;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Request size limits
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # =========================================================================
    # HEALTH CHECK ENDPOINTS (Public)
    # =========================================================================
    location /api/health {
        limit_req zone=api_health burst=20 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/version {
        limit_req zone=api_health burst=20 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # AUTHENTICATION ENDPOINTS (Strict rate limiting for brute-force protection)
    # =========================================================================

    # Login - very strict
    location ~ ^/api/auth/login$ {
        limit_req zone=api_login burst=5 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Login with recovery code
    location ~ ^/api/auth/login-with-recovery$ {
        limit_req zone=api_login burst=5 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Other auth endpoints (2FA, password, sessions, etc.)
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # USER MANAGEMENT
    # =========================================================================

    # Bulk actions - stricter
    location ~ ^/api/users/bulk-action$ {
        limit_req zone=api_heavy burst=3 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/users {
        limit_req zone=api_general burst=30 nodelay;

        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # SESSIONS, ROLES, PERMISSIONS, DASHBOARD, LOGIN ACTIVITY
    # =========================================================================
    location /api/sessions {
        limit_req zone=api_general burst=30 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/roles {
        limit_req zone=api_general burst=30 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/permissions {
        limit_req zone=api_general burst=30 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/dashboard {
        limit_req zone=api_general burst=20 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/login-activity {
        limit_req zone=api_general burst=20 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # CATCH-ALL API ROUTES
    # =========================================================================
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        add_header X-Request-ID $request_id always;

        proxy_pass http://laravel_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # =========================================================================
    # FRONTEND (React Vite Dev Server)
    # =========================================================================
    location / {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # =========================================================================
    # SECURITY - Block sensitive files
    # =========================================================================
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|sql|bak)$ {
        deny all;
    }
}
